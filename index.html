<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Weather App</h1>

    <div class="search-box">
      <input id="cityInput" type="text" placeholder="Enter city name" />
      <button id="searchBtn">Search</button>
    </div>

    <p id="loadingMessage" class="hidden">Loading weather data...</p>
    <div id="weatherResult" class="weather-card hidden">
      <h2 id="cityName"></h2>
      <img id="weatherIcon" alt="Weather icon" />
      <p id="temperature"></p>
      <p id="description"></p>
    </div>

    <p id="errorMessage" class="error hidden"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
